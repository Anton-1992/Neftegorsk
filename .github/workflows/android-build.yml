name: Build Android APK

on:
  push:
    branches: [ arena/019f868c-neftegorsk ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ arena/019f868c-neftegorsk ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      EXPORT_NAME: "Android"
      PROJECT_PATH: "./project"
      BUILD_DIR: "./builds"

    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }

      - name: Setup Godot
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ${{ env.PROJECT_PATH }}

      - name: Create build directory
        run: mkdir -p ${{ env.BUILD_DIR }}

      - name: Create debug keystore
        run: |
          mkdir -p ~/.local/share/godot/app_userdata/Neftegorsk
          keytool -genkey -v -keystore ~/.local/share/godot/app_userdata/Neftegorsk/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname 
