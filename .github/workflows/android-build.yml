name: Build Android APK

on:
  push:
    branches: [ arena/019f868c-neftegorsk ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ arena/019f868c-neftegorsk ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      EXPORT_NAME: "Android"
      PROJECT_PATH: "./project"
      BUILD_DIR: "./builds"

    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }

      - name: Setup Godot 4.2.2
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          relative_project_path: ${{ env.PROJECT_PATH }}
          export_debug: true

      - name: Create build directory
        run: mkdir -p ${{ env.BUILD_DIR }}

      - name: Create debug keystore
        run: |
          mkdir -p ~/.local/share/godot/app_userdata/Neftegorsk
          keytool -genkey -v -keystore ~/.local/share/godot/app_userdata/Neftegorsk/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true

      - uses: android-actions/setup-android@v3
        with: { api-level: 34, ndk-version: r26c, cmdline-tools-version: latest }

      - run: yes | sdkmanager --licenses

      - name: Configure Android SDK
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${ANDROID_NDK_HOME}" >> $GITHUB_ENV
          echo "JAVA_HOME=${JAVA_HOME}" >> $GITHUB_ENV

      - name: Diagnostic
        run: |
          echo "=== Godot ===" && godot --version
          echo "=== Project ===" && ls -la ${{ env.PROJECT_PATH }}/
          echo "=== Presets ===" && cat ${{ env.PROJECT_PATH }}/export_presets.cfg
          echo "=== SDK ===" && echo $ANDROID_SDK_ROOT
          echo "=== Keystore ===" && ls -la ~/.local/share/godot/app_userdata/Neftegorsk/

      # Action сам сделает экспорт с --export-debug (export_debug: true)

      - name: Find APK
        run: |
          APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          if [ -f "$APK" ]; then
            cp "$APK" ${{ env.BUILD_DIR }}/Neftegorsk.apk
            ls -la ${{ env.BUILD_DIR }}/Neftegorsk.apk
          else
            echo "APK not found" && exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: Neftegorsk-APK
          path: ${{ env.BUILD_DIR }}/Neftegorsk.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BUILD_DIR }}/Neftegorsk.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
