name: Build Android APK

on:
  push:
    branches: [ arena/019f8138-neftegorsk ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ arena/019f8138-neftegorsk ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GODOT_VERSION: "4.3"
      EXPORT_NAME: "Android"
      PROJECT_PATH: "./project"
      BUILD_DIR: "./builds"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ${{ env.PROJECT_PATH }}

      - name: Create build directory
        run: mkdir -p ${{ env.BUILD_DIR }}

      - name: Create debug keystore
        run: |
          mkdir -p ~/.local/share/godot/app_userdata/Neftegorsk
          keytool -genkey -v \
            -keystore ~/.local/share/godot/app_userdata/Neftegorsk/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            2>/dev/null || true

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r26c
          cmdline-tools-version: latest

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Configure Android SDK for Godot
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${ANDROID_NDK_HOME}" >> $GITHUB_ENV
          echo "JAVA_HOME=${JAVA_HOME}" >> $GITHUB_ENV

      - name: Verify project structure
        run: |
          ls -la ${{ env.PROJECT_PATH }}/
          ls -la ${{ env.PROJECT_PATH }}/export_presets.cfg
          cat ${{ env.PROJECT_PATH }}/export_presets.cfg

      - name: Export APK
        run: |
          cd ${{ env.PROJECT_PATH }}
          godot --headless --export-release "${{ env.EXPORT_NAME }}" ../${{ env.BUILD_DIR }}/Neftegorsk.apk 2>&1
          echo "Export exit code: $?"

      - name: Verify APK
        run: |
          ls -la ${{ env.BUILD_DIR }}/
          file ${{ env.BUILD_DIR }}/Neftegorsk.apk
          unzip -l ${{ env.BUILD_DIR }}/Neftegorsk.apk | head -20

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Neftegorsk-APK
          path: ${{ env.BUILD_DIR }}/Neftegorsk.apk
          retention-days: 30

      - name: Create Release (on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BUILD_DIR }}/Neftegorsk.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
