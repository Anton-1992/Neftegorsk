<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="oppBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a"/>
      <stop offset="100%" style="stop-color:#0d1a2a"/>
    </linearGradient>
    <linearGradient id="chameleonTrim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="50%" style="stop-color:#00aa66"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="128" cy="128" r="120" fill="url(#oppBg)" stroke="url(#chameleonTrim)" stroke-width="4"/>
  
  <!-- Opportunist - chameleon-like, adaptable, wearing business casual -->
  <g filter="url(#subtleGlow)">
    <!-- Suit silhouette - changes color -->
    <g id="suit" fill="#2a4a5a">
      <ellipse cx="128" cy="170" rx="48" ry="45"/>
      <rect x="80" y="130" width="96" height="40" rx="5"/>
      <!-- Lapels -->
      <path d="M128 130 L100 160 L110 160 L128 140 Z" fill="#1a3a4a"/>
      <path d="M128 130 L156 160 L146 160 L128 140 Z" fill="#1a3a4a"/>
      <!-- Tie -->
      <path d="M128 130 L120 155 L128 155 L136 155 Z" fill="#008866"/>
      <circle cx="128" cy="135" r="4" fill="#00aa66"/>
    </g>
    
    <!-- Head -->
    <circle cx="128" cy="105" r="30" fill="#e8d8c8"/>
    <!-- Hair - swept back, adaptable -->
    <path d="M98 90 Q128 75 158 90 Q145 100 128 105 Q111 100 98 90" fill="#2a2a3a"/>
    <!-- Glasses - reflective, hiding eyes -->
    <g fill="none" stroke="#1a1a2a" stroke-width="3">
      <circle cx="115" cy="102" r="14"/>
      <circle cx="141" cy="102" r="14"/>
      <line x1="129" y1="102" x2="141" y2="102"/>
    </g>
    <g fill="#003322" opacity="0.9">
      <circle cx="115" cy="102" r="12"/>
      <circle cx="141" cy="102" r="12"/>
    </g>
    <!-- Subtle smirk -->
    <path d="M115 115 Q128 122 141 115" stroke="#1a1a2a" stroke-width="2.5" fill="none"/>
    
    <!-- Chameleon on shoulder -->
    <g transform="translate(165, 120) scale(0.7)">
      <ellipse cx="0" cy="0" rx="18" ry="12" fill="#00aa66"/>
      <ellipse cx="-15" cy="-5" rx="8" ry="6" fill="#00aa66"/>
      <circle cx="-20" cy="-7" r="3" fill="#fff"/>
      <circle cx="-21" cy="-7" r="1" fill="#000"/>
      <path d="M18 0 Q25 -5 30 0 Q25 5 18 0" fill="#00aa66"/>
      <path d="M-2 0 Q-5 -8 -10 -10" stroke="#008844" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    
    <!-- Documents/tablet in hand -->
    <g transform="translate(70, 155)">
      <rect x="0" y="0" width="28" height="36" rx="2" fill="#1a3a4a" stroke="#00aa66" stroke-width="2"/>
      <rect x="3" y="3" width="22" height="30" fill="#0d1a2a"/>
      <line x1="14" y1="8" x2="14" y2="28" stroke="#00aa66" stroke-width="1" opacity="0.5"/>
      <line x1="6" y1="16" x2="22" y2="16" stroke="#00aa66" stroke-width="1" opacity="0.5"/>
    </g>
  </g>
  
  <text x="128" y="220" font-family="Arial Black" font-size="20" font-weight="bold" fill="url(#chameleonTrim)" text-anchor="middle" stroke="#000" stroke-width="2">ОПОРТУНИСТ</text>
</svg>