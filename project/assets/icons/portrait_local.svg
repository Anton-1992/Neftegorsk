<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="localBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2d1a"/>
      <stop offset="100%" style="stop-color:#0d1a0d"/>
    </linearGradient>
    <linearGradient id="bronzeTrim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CD7F32"/>
      <stop offset="50%" style="stop-color:#B87333"/>
      <stop offset="100%" style="stop-color:#CD7F32"/>
    </linearGradient>
    <filter id="warmGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="128" cy="128" r="120" fill="url(#localBg)" stroke="url(#bronzeTrim)" stroke-width="4"/>
  
  <!-- Local - friendly, approachable, work clothes -->
  <g filter="url(#warmGlow)">
    <!-- Plaid shirt -->
    <g fill="#3d5a3d">
      <ellipse cx="128" cy="170" rx="50" ry="42"/>
      <rect x="78" y="130" width="100" height="40" rx="5"/>
    </g>
    <!-- Plaid pattern -->
    <g stroke="#2d4a2d" stroke-width="1.5" opacity="0.6">
      <line x1="78" y1="130" x2="178" y2="130"/>
      <line x1="78" y1="145" x2="178" y2="145"/>
      <line x1="78" y1="160" x2="178" y2="160"/>
      <line x1="78" y1="170" x2="178" y2="170"/>
      <line x1="95" y1="130" x2="95" y2="170"/>
      <line x1="110" y1="130" x2="110" y2="170"/>
      <line x1="128" y1="130" x2="128" y2="170"/>
      <line x1="146" y1="130" x2="146" y2="170"/>
      <line x1="161" y1="130" x2="161" y2="170"/>
    </g>
    <!-- Sleeves rolled up -->
    <rect x="60" y="155" width="18" height="30" rx="3" fill="#8d7a6a"/>
    <rect x="178" y="155" width="18" height="30" rx="3" fill="#8d7a6a"/>
    <!-- Arms crossed -->
    <path d="M100 155 Q105 165 128 160 Q151 165 156 155" stroke="#8d7a6a" stroke-width="22" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M110 165 Q115 175 128 170 Q141 175 146 165" stroke="#8d7a6a" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Hands -->
    <circle cx="108" cy="165" r="10" fill="#d8c8b8"/>
    <circle cx="148" cy="165" r="10" fill="#d8c8b8"/>
    
    <!-- Head - warm, friendly -->
    <circle cx="128" cy="105" r="32" fill="#e8d8c8"/>
    <!-- Hair - practical, slightly messy -->
    <path d="M96 90 Q128 70 160 90 Q150 100 128 105 Q106 100 96 90" fill="#4a3a2a"/>
    <path d="M110 88 Q128 75 146 88" stroke="#3a2a1a" stroke-width="1.5" fill="none"/>
    <!-- Face - kind eyes, smile lines -->
    <ellipse cx="115" cy="100" rx="7" ry="5" fill="#2d4a2d"/>
    <ellipse cx="141" cy="100" rx="7" ry="5" fill="#2d4a2d"/>
    <circle cx="116" cy="99" r="3" fill="#000"/>
    <circle cx="142" cy="99" r="3" fill="#000"/>
    <!-- Smile lines -->
    <path d="M105 105 Q110 112 115 110" stroke="#a89888" stroke-width="1.5" fill="none"/>
    <path d="M141 110 Q146 112 151 105" stroke="#a89888" stroke-width="1.5" fill="none"/>
    <!-- Warm smile -->
    <path d="M108 115 Q128 125 148 115" stroke="#2d4a2d" stroke-width="3" fill="none"/>
    <path d="M115 115 Q128 118 141 115" stroke="#2d4a2d" stroke-width="1.5" fill="none"/>
    <!-- Cap/hat -->
    <path d="M85 80 Q128 60 171 80" stroke="#3d5a3d" stroke-width="25" fill="none" stroke-linecap="round"/>
    <path d="M128 60 L128 85" stroke="#3d5a3d" stroke-width="25" stroke-linecap="round"/>
    <!-- Badge on cap -->
    <circle cx="128" cy="68" r="6" fill="#CD7F32"/>
    <text x="128" y="72" font-size="6" fill="#000" text-anchor="middle" font-weight="bold">ИВ</text>
    
    <!-- Family photo on chest -->
    <rect x="135" y="140" width="18" height="14" rx="1" fill="#1a1a1a" stroke="#CD7F32" stroke-width="1"/>
    <circle cx="139" cy="144" r="3" fill="#e8d8c8"/>
    <circle cx="147" cy="144" r="2.5" fill="#e8d8c8"/>
    <ellipse cx="143" cy="150" rx="6" ry="3" fill="#e8d8c8"/>
  </g>
  
  <text x="128" y="220" font-family="Arial Black" font-size="20" font-weight="bold" fill="url(#bronzeTrim)" text-anchor="middle" stroke="#000" stroke-width="2">МЕСТНЫЙ</text>
</svg>