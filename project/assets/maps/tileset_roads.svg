<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="asphalt" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#1a1a1a"/>
      <g fill="#2a2a2a" opacity="0.3">
        <circle cx="8" cy="8" r="2"/>
        <circle cx="24" cy="40" r="1.5"/>
        <circle cx="48" cy="16" r="2"/>
        <circle cx="56" cy="56" r="1"/>
        <circle cx="12" cy="52" r="1.5"/>
        <circle cx="40" cy="8" r="1"/>
      </g>
      <g fill="#333" opacity="0.2">
        <rect x="0" y="30" width="64" height="4"/>
        <rect x="30" y="0" width="4" height="64"/>
      </g>
    </pattern>
    <pattern id="asphaltLight" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#2d2d2d"/>
      <g fill="#3a3a3a" opacity="0.3">
        <circle cx="8" cy="8" r="2"/>
        <circle cx="24" cy="40" r="1.5"/>
        <circle cx="48" cy="16" r="2"/>
        <circle cx="56" cy="56" r="1"/>
      </g>
    </pattern>
    <pattern id="cobblestone" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#3a3a3a"/>
      <g fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1">
        <rect x="2" y="2" width="18" height="18" rx="2"/>
        <rect x="22" y="2" width="18" height="18" rx="2"/>
        <rect x="42" y="2" width="18" height="18" rx="2"/>
        <rect x="2" y="22" width="18" height="18" rx="2"/>
        <rect x="22" y="22" width="18" height="18" rx="2"/>
        <rect x="42" y="22" width="18" height="18" rx="2"/>
        <rect x="2" y="42" width="18" height="18" rx="2"/>
        <rect x="22" y="42" width="18" height="18" rx="2"/>
        <rect x="42" y="42" width="18" height="18" rx="2"/>
      </g>
    </pattern>
    <pattern id="highway" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#151515"/>
      <g fill="#252525" opacity="0.4">
        <circle cx="10" cy="10" r="2"/>
        <circle cx="30" cy="50" r="1"/>
        <circle cx="50" cy="20" r="1.5"/>
      </g>
    </pattern>
    <pattern id="dirtRoad" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#4a3a2a"/>
      <g fill="#5a4a3a" opacity="0.4">
        <circle cx="8" cy="8" r="3"/>
        <circle cx="28" cy="48" r="2"/>
        <circle cx="48" cy="18" r="2.5"/>
        <circle cx="58" cy="58" r="1.5"/>
        <circle cx="18" cy="52" r="2"/>
      </g>
    </pattern>
  </defs>
  
  <!-- Tile grid 8x8 = 64 tiles of 64x64 -->
  <!-- Row 0: Basic asphalt variants -->
  <rect x="0" y="0" width="64" height="64" fill="url(#asphalt)"/>
  <rect x="64" y="0" width="64" height="64" fill="url(#asphaltLight)"/>
  <rect x="128" y="0" width="64" height="64" fill="url(#highway)"/>
  <rect x="192" y="0" width="64" height="64" fill="url(#dirtRoad)"/>
  <rect x="256" y="0" width="64" height="64" fill="url(#cobblestone)"/>
  <rect x="320" y="0" width="64" height="64" fill="#1a1a1a"/>
  <rect x="384" y="0" width="64" height="64" fill="#2d2d2d"/>
  <rect x="448" y="0" width="64" height="64" fill="#3a3a3a"/>
  
  <!-- Row 1: Horizontal roads with markings -->
  <g>
    <rect x="0" y="64" width="64" height="64" fill="url(#asphalt)"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,8" opacity="0.7"/>
  </g>
  <g>
    <rect x="64" y="64" width="64" height="64" fill="url(#asphalt)"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>
  </g>
  <g>
    <rect x="128" y="64" width="64" height="64" fill="url(#highway)"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#FFFFFF" stroke-width="3" opacity="0.9"/>
    <line x1="0" y1="20" x2="64" y2="20" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.5"/>
    <line x1="0" y1="44" x2="64" y2="44" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.5"/>
  </g>
  <g>
    <rect x="192" y="64" width="64" height="64" fill="url(#dirtRoad)"/>
  </g>
  <g>
    <rect x="256" y="64" width="64" height="64" fill="url(#cobblestone)"/>
  </g>
  <rect x="320" y="64" width="64" height="64" fill="#1a1a1a"/>
  <rect x="384" y="64" width="64" height="64" fill="#2d2d2d"/>
  <rect x="448" y="64" width="64" height="64" fill="#3a3a3a"/>
  
  <!-- Row 2: Vertical roads -->
  <g>
    <rect x="0" y="128" width="64" height="64" fill="url(#asphalt)"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,8" opacity="0.7"/>
  </g>
  <g>
    <rect x="64" y="128" width="64" height="64" fill="url(#asphalt)"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>
  </g>
  <g>
    <rect x="128" y="128" width="64" height="64" fill="url(#highway)"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#FFFFFF" stroke-width="3" opacity="0.9"/>
    <line x1="20" y1="0" x2="20" y2="64" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.5"/>
    <line x1="44" y1="0" x2="44" y2="64" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.5"/>
  </g>
  <g>
    <rect x="192" y="128" width="64" height="64" fill="url(#dirtRoad)"/>
  </g>
  <g>
    <rect x="256" y="128" width="64" height="64" fill="url(#cobblestone)"/>
  </g>
  <rect x="320" y="128" width="64" height="64" fill="#1a1a1a"/>
  <rect x="384" y="128" width="64" height="64" fill="#2d2d2d"/>
  <rect x="448" y="128" width="64" height="64" fill="#3a3a3a"/>
  
  <!-- Row 3: Intersections (4-way) -->
  <g>
    <rect x="0" y="192" width="64" height="64" fill="url(#asphalt)"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,8" opacity="0.7"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,8" opacity="0.7"/>
    <circle cx="32" cy="32" r="12" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
  </g>
  <g>
    <rect x="64" y="192" width="64" height="64" fill="url(#asphalt)"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>
  </g>
  <g>
    <rect x="128" y="192" width="64" height="64" fill="url(#highway)"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#FFFFFF" stroke-width="3" opacity="0.9"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#FFFFFF" stroke-width="3" opacity="0.9"/>
    <line x1="0" y1="20" x2="64" y2="20" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.5"/>
    <line x1="0" y1="44" x2="64" y2="44" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.5"/>
    <line x1="20" y1="0" x2="20" y2="64" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.5"/>
    <line x1="44" y1="0" x2="44" y2="64" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.5"/>
  </g>
  <g>
    <rect x="192" y="192" width="64" height="64" fill="url(#dirtRoad)"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#886644" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.4"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#886644" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.4"/>
  </g>
  <g>
    <rect x="256" y="192" width="64" height="64" fill="url(#cobblestone)"/>
    <circle cx="32" cy="32" r="10" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="3,3"/>
  </g>
  <rect x="320" y="192" width="64" height="64" fill="#1a1a1a"/>
  <rect x="384" y="192" width="64" height="64" fill="#2d2d2d"/>
  <rect x="448" y="192" width="64" height="64" fill="#3a3a3a"/>
  
  <!-- Row 4: T-junctions -->
  <g>
    <rect x="0" y="256" width="64" height="64" fill="url(#asphalt)"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,8" opacity="0.7"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,8" opacity="0.7"/>
    <line x1="32" y1="0" x2="32" y2="32" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,8" opacity="0.7"/>
  </g>
  <g>
    <rect x="64" y="256" width="64" height="64" fill="url(#asphalt)"/>
    <line x1="0" y1="32" x2="32" y2="32" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>
    <line x1="32" y1="32" x2="64" y2="32" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>
  </g>
  <g>
    <rect x="128" y="256" width="64" height="64" fill="url(#highway)"/>
    <line x1="0" y1="32" x2="32" y2="32" stroke="#FFFFFF" stroke-width="3" opacity="0.9"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#FFFFFF" stroke-width="3" opacity="0.9"/>
    <line x1="32" y1="32" x2="64" y2="32" stroke="#FFFFFF" stroke-width="3" opacity="0.9"/>
  </g>
  <g>
    <rect x="192" y="256" width="64" height="64" fill="url(#dirtRoad)"/>
    <line x1="0" y1="32" x2="32" y2="32" stroke="#886644" stroke-width="1.5" opacity="0.4"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#886644" stroke-width="1.5" opacity="0.4"/>
    <line x1="32" y1="32" x2="64" y2="32" stroke="#886644" stroke-width="1.5" opacity="0.4"/>
  </g>
  <rect x="256" y="256" width="64" height="64" fill="url(#cobblestone)"/>
  <rect x="320" y="256" width="64" height="64" fill="#1a1a1a"/>
  <rect x="384" y="256" width="64" height="64" fill="#2d2d2d"/>
  <rect x="448" y="256" width="64" height="64" fill="#3a3a3a"/>
  
  <!-- Row 5: Curves -->
  <g>
    <rect x="0" y="320" width="64" height="64" fill="url(#asphalt)"/>
    <path d="M64 32 A32 32 0 0 1 32 64" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,8" opacity="0.7" fill="none"/>
  </g>
  <g>
    <rect x="64" y="320" width="64" height="64" fill="url(#asphalt)"/>
    <path d="M0 32 A32 32 0 0 0 32 64" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,8" opacity="0.7" fill="none"/>
  </g>
  <g>
    <rect x="128" y="320" width="64" height="64" fill="url(#asphalt)"/>
    <path d="M0 32 A32 32 0 0 1 32 0" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,8" opacity="0.7" fill="none"/>
  </g>
  <g>
    <rect x="192" y="320" width="64" height="64" fill="url(#asphalt)"/>
    <path d="M64 32 A32 32 0 0 0 32 0" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,8" opacity="0.7" fill="none"/>
  </g>
  <rect x="256" y="320" width="64" height="64" fill="url(#highway)"/>
  <rect x="320" y="320" width="64" height="64" fill="#1a1a1a"/>
  <rect x="384" y="320" width="64" height="64" fill="#2d2d2d"/>
  <rect x="448" y="320" width="64" height="64" fill="#3a3a3a"/>
  
  <!-- Row 6: Crosswalks, parking, special -->
  <g>
    <rect x="0" y="384" width="64" height="64" fill="url(#asphalt)"/>
    <g fill="#FFFFFF" opacity="0.4">
      <rect x="4" y="16" width="56" height="4"/>
      <rect x="4" y="24" width="56" height="4"/>
      <rect x="4" y="32" width="56" height="4"/>
      <rect x="4" y="40" width="56" height="4"/>
      <rect x="4" y="48" width="56" height="4"/>
    </g>
  </g>
  <g>
    <rect x="64" y="384" width="64" height="64" fill="url(#asphalt)"/>
    <g fill="#FFFFFF" opacity="0.3">
      <rect x="8" y="8" width="12" height="24"/>
      <rect x="24" y="8" width="12" height="24"/>
      <rect x="40" y="8" width="12" height="24"/>
      <rect x="8" y="36" width="12" height="24"/>
      <rect x="24" y="36" width="12" height="24"/>
      <rect x="40" y="36" width="12" height="24"/>
    </g>
  </g>
  <g>
    <rect x="128" y="384" width="64" height="64" fill="#1a3a1a"/>
    <g fill="#2a5a2a" opacity="0.5">
      <circle cx="16" cy="16" r="6"/>
      <circle cx="48" cy="16" r="6"/>
      <circle cx="16" cy="48" r="6"/>
      <circle cx="48" cy="48" r="6"/>
    </g>
  </g>
  <g>
    <rect x="192" y="384" width="64" height="64" fill="#2d1a1a"/>
    <rect x="4" y="4" width="56" height="24" rx="4" fill="#1a1a1a"/>
    <text x="32" y="22" font-size="8" fill="#888" text-anchor="middle" font-weight="bold">P</text>
    <line x1="20" y1="8" x2="20" y2="24" stroke="#444" stroke-width="1"/>
    <line x1="44" y1="8" x2="44" y2="24" stroke="#444" stroke-width="1"/>
  </g>
  <g>
    <rect x="256" y="384" width="64" height="64" fill="#1a1a2d"/>
    <rect x="8" y="8" width="20" height="20" rx="3" fill="#00aa66" opacity="0.3"/>
    <text x="18" y="22" font-size="7" fill="#00ff88" text-anchor="middle">EV</text>
    <circle cx="48" cy="18" r="6" fill="#00aa66"/>
    <line x1="48" y1="12" x2="48" y2="18" stroke="#fff" stroke-width="2"/>
  </g>
  <rect x="320" y="384" width="64" height="64" fill="#1a1a1a"/>
  <rect x="384" y="384" width="64" height="64" fill="#2d2d2d"/>
  <rect x="448" y="384" width="64" height="64" fill="#3a3a3a"/>
  
  <!-- Row 7: Sidewalks, borders, transitions -->
  <g>
    <rect x="0" y="448" width="64" height="64" fill="#3a3a3a"/>
    <rect x="0" y="448" width="64" height="8" fill="#4a4a4a"/>
    <rect x="0" y="448" width="8" height="64" fill="#4a4a4a"/>
  </g>
  <g>
    <rect x="64" y="448" width="64" height="64" fill="#3a3a3a"/>
    <rect x="56" y="448" width="8" height="64" fill="#4a4a4a"/>
    <rect x="0" y="448" width="8" height="64" fill="#4a4a4a"/>
  </g>
  <g>
    <rect x="128" y="448" width="64" height="64" fill="#2d2d2d"/>
    <rect x="0" y="448" width="64" height="8" fill="#1a1a1a"/>
    <rect x="0" y="448" width="8" height="64" fill="#1a1a1a"/>
  </g>
  <g>
    <rect x="192" y="448" width="64" height="64" fill="url(#asphalt)"/>
    <rect x="0" y="448" width="64" height="8" fill="#3a3a3a"/>
    <rect x="0" y="448" width="8" height="64" fill="#3a3a3a"/>
  </g>
  <g>
    <rect x="256" y="448" width="64" height="64" fill="url(#cobblestone)"/>
    <rect x="0" y="448" width="64" height="8" fill="#3a3a3a"/>
    <rect x="0" y="448" width="8" height="64" fill="#3a3a3a"/>
  </g>
  <g>
    <rect x="320" y="448" width="64" height="64" fill="#2d2d2d"/>
    <line x1="0" y1="0" x2="64" y2="64" stroke="#4a4a4a" stroke-width="3"/>
  </g>
  <g>
    <rect x="384" y="448" width="64" height="64" fill="#1a1a1a"/>
    <line x1="64" y1="0" x2="0" y2="64" stroke="#4a4a4a" stroke-width="3"/>
  </g>
  <rect x="448" y="448" width="64" height="64" fill="#3a3a3a"/>
</svg>