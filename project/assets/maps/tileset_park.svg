  <rect x="192" y="64" width="64" height="64" fill="url(#grassWild)"/>
  <rect x="256" y="64" width="64" height="64" fill="url(#dirt)"/>
  <rect x="320" y="64" width="64" height="64" fill="url(#sand)"/>
  <rect x="384" y="64" width="64" height="64" fill="url(#path)"/>
  <rect x="448" y="64" width="64" height="64" fill="url(#plaza)"/>
  
  <rect x="0" y="128" width="64" height="64" fill="url(#playground)"/>
