<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grass" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#2d5a2d"/>
      <g fill="#3a7a3a" opacity="0.5">
        <circle cx="8" cy="8" r="2"/>
        <circle cx="24" cy="40" r="1.5"/>
        <circle cx="48" cy="16" r="2"/>
        <circle cx="56" cy="56" r="1"/>
        <circle cx="12" cy="52" r="1.5"/>
        <circle cx="40" cy="8" r="1"/>
        <circle cx="32" cy="32" r="1.5"/>
      </g>
      <g fill="#4a8a4a" opacity="0.3">
        <ellipse cx="16" cy="16" rx="3" ry="2"/>
        <ellipse cx="48" cy="48" rx="2" ry="3"/>
      </g>
    </pattern>
    <pattern id="grassPark" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#3a7a3a"/>
      <g fill="#4a9a4a" opacity="0.5">
        <circle cx="8" cy="8" r="2"/>
        <circle cx="24" cy="40" r="1.5"/>
        <circle cx="48" cy="16" r="2"/>
        <circle cx="56" cy="56" r="1"/>
      </g>
      <g fill="#2d6a2d" opacity="0.4">
        <ellipse cx="16" cy="16" rx="4" ry="3"/>
        <ellipse cx="48" cy="48" rx="3" ry="4"/>
      </g>
      <!-- Flowers -->
      <g fill="#FF6B6B" opacity="0.8">
        <circle cx="12" cy="12" r="1.5"/>
        <circle cx="52" cy="52" r="1"/>
      </g>
      <g fill="#FFD93D" opacity="0.8">
        <circle cx="32" cy="20" r="1.5"/>
        <circle cx="44" cy="44" r="1"/>
      </g>
      <g fill="#6BCB77" opacity="0.8">
        <circle cx="20" cy="48" r="1"/>
        <circle cx="60" cy="12" r="1.5"/>
      </g>
    </pattern>
    <pattern id="grassWild" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#2a5a2a"/>
      <g fill="#3a7a3a" opacity="0.6">
        <circle cx="8" cy="8" r="3"/>
        <circle cx="24" cy="40" r="2"/>
        <circle cx="48" cy="16" r="2.5"/>
        <circle cx="56" cy="56" r="1.5"/>
        <circle cx="12" cy="52" r="2"/>
        <circle cx="40" cy="8" r="1.5"/>
        <circle cx="32" cy="32" r="2"/>
        <circle cx="8" cy="48" r="2"/>
        <circle cx="48" cy="8" r="2"/>
      </g>
      <g fill="#1a4a1a" opacity="0.4">
        <ellipse cx="16" cy="16" rx="5" ry="4"/>
        <ellipse cx="48" cy="48" rx="4" ry="5"/>
        <ellipse cx="32" cy="32" rx="6" ry="3"/>
      </g>
    </pattern>
    <pattern id="dirt" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#4a3a2a"/>
      <g fill="#5a4a3a" opacity="0.5">
        <circle cx="8" cy="8" r="3"/>
        <circle cx="28" cy="48" r="2"/>
        <circle cx="48" cy="18" r="2.5"/>
        <circle cx="58" cy="58" r="1.5"/>
        <circle cx="18" cy="52" r="2"/>
      </g>
      <g fill="#3a2a1a" opacity="0.3">
        <ellipse cx="16" cy="16" rx="4" ry="3"/>
        <ellipse cx="48" cy="48" rx="3" ry="4"/>
      </g>
    </pattern>
    <pattern id="sand" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#E8D8B8"/>
      <g fill="#D8C8A8" opacity="0.5">
        <circle cx="8" cy="8" r="2"/>
        <circle cx="24" cy="40" r="1.5"/>
        <circle cx="48" cy="16" r="2"/>
        <circle cx="56" cy="56" r="1"/>
        <circle cx="12" cy="52" r="1.5"/>
        <circle cx="40" cy="8" r="1"/>
      </g>
      <g fill="#C8B898" opacity="0.3">
        <ellipse cx="16" cy="16" rx="3" ry="2"/>
        <ellipse cx="48" cy="48" rx="2" ry="3"/>
      </g>
    </pattern>
    <pattern id="path" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#5a4a3a"/>
      <g fill="#6a5a4a" opacity="0.5">
        <circle cx="8" cy="8" r="2"/>
        <circle cx="24" cy="40" r="1.5"/>
        <circle cx="48" cy="16" r="2"/>
        <circle cx="56" cy="56" r="1"/>
      </g>
      <rect x="20" y="0" width="24" height="64" fill="#4a3a2a" opacity="0.5"/>
    </pattern>
    <pattern id="plaza" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#5a5a5a"/>
      <g fill="#6a6a6a" opacity="0.4">
        <rect x="0" y="0" width="16" height="16"/>
        <rect x="16" y="16" width="16" height="16"/>
        <rect x="32" y="32" width="16" height="16"/>
        <rect x="48" y="48" width="16" height="16"/>
        <rect x="0" y="32" width="16" height="16"/>
        <rect x="32" y="0" width="16" height="16"/>
        <rect x="16" y="48" width="16" height="16"/>
        <rect x="48" y="16" width="16" height="16"/>
      </g>
      <g stroke="#4a4a4a" stroke-width="0.5">
        <line x1="0" y1="0" x2="64" y2="64"/>
        <line x1="16" y1="0" x2="64" y2="48"/>
        <line x1="0" y1="16" x2="48" y2="64"/>
      </g>
    </pattern>
    <pattern id="playground" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="url(#grassPark)"/>
      <rect x="16" y="16" width="32" height="32" fill="#D8C8A8" opacity="0.7" rx="4"/>
      <g stroke="#8B7355" stroke-width="2" fill="none">
        <rect x="20" y="20" width="24" height="12" rx="2"/> <!-- sandbox -->
        <circle cx="48" cy="32" r="8"/> <!-- carousel -->
        <line x1="20" y1="44" x2="44" y2="44"/> <!-- swing beam -->
        <line x1="24" y1="44" x2="24" y2="56"/> <!-- swing -->
        <line x1="40" y1="44" x2="40" y2="56"/> <!-- swing -->
      </g>
    </pattern>
    <pattern id="fountain" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="url(#grassPark)"/>
      <circle cx="32" cy="32" r="12" fill="#1a3a5a"/>
      <circle cx="32" cy="32" r="10" fill="#2a5a8a"/>
      <circle cx="32" cy="32" r="7" fill="#3a7acf"/>
      <circle cx="32" cy="32" r="4" fill="#FFFFFF" opacity="0.3"/>
      <g stroke="#FFFFFF" stroke-width="1.5" opacity="0.6" fill="none">
        <circle cx="32" cy="32" r="5"/>
        <line x1="32" y1="27" x2="32" y2="20"/>
        <line x1="32" y1="37" x2="32" y2="44"/>
        <line x1="27" y1="32" x2="20" y2="32"/>
        <line x1="37" y1="32" x2="44" y2="32"/>
      </g>
    </pattern>
  </defs>
  
  <!-- 8x8 grid -->
  <rect x="0" y="0" width="64" height="64" fill="url(#grass)"/>
  <rect x="64" y="0" width="64" height="64" fill="url(#grassPark)"/>
  <rect x="128" y="0" width="64" height="64" fill="url(#grassWild)"/>
  <rect x="192" y="0" width="64" height="64" fill="url(#dirt)"/>
