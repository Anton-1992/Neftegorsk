  <rect x="384" y="192" width="64" height="64" fill="url(#dirt)"/>
  <rect x="448" y="192" width="64" height="64" fill="url(#sand)"/>
  
  <rect x="0" y="256" width="64" height="64" fill="url(#path)"/>
  <rect x="64" y="256" width="64" height="64" fill="url(#plaza)"/>
  <rect x="128" y="256" width="64" height="64" fill="url(#playground)"/>
  <rect x="192" y="256" width="64" height="64" fill="url(#fountain)"/>
  <rect x="256" y="256" width="64" height="64" fill="url(#grassPark)"/>
  <rect x="320" y="256" width="64" height="64" fill="url(#grass)"/>
  <rect x="384" y="256" width="64" height="64" fill="url(#grassWild)"/>
  <rect x="448" y="256" width="64" height="64" fill="url(#dirt)"/>
  
  <rect x="0" y="320" width="64" height="64" fill="url(#sand)"/>
  <rect x="64" y="320" width="64" height="64" fill="url(#path)"/>
  <rect x="128" y="320" width="64" height="64" fill="url(#plaza)"/>
  <rect x="192" y="320" width="64" height="64" fill="url(#playground)"/>
  <rect x="256" y="320" width="64" height="64" fill="url(#fountain)"/>
  <rect x="320" y="320" width="64" height="64" fill="url(#grassPark)"/>
  <rect x="384" y="320" width="64" height="64" fill="url(#grass)"/>
  <rect x="448" y="320" width="64" height="64" fill="url(#grassWild)"/>
  
  <rect x="0" y="384" width="64" height="64" fill="url(#dirt)"/>
  <rect x="64" y="384" width="64" height="64" fill="url(#sand)"/>
  <rect x="128" y="384" width="64" height="64" fill="url(#path)"/>
