  <rect x="128" y="128" width="64" height="64" fill="url(#grassPark)"/>
  <rect x="192" y="128" width="64" height="64" fill="url(#grass)"/>
  <rect x="256" y="128" width="64" height="64" fill="url(#grassWild)"/>
  <rect x="320" y="128" width="64" height="64" fill="url(#dirt)"/>
  <rect x="384" y="128" width="64" height="64" fill="url(#sand)"/>
  <rect x="448" y="128" width="64" height="64" fill="url(#path)"/>
  
