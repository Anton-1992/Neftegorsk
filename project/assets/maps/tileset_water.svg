<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="waterDeep" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#0d1a2d"/>
      <g fill="#152a45" opacity="0.4">
        <path d="M0 32 Q16 28 32 32 Q48 36 64 32" stroke="#1a3a55" stroke-width="1.5" fill="none"/>
        <path d="M0 48 Q16 44 32 48 Q48 52 64 48" stroke="#1a3a55" stroke-width="1" fill="none" stroke-dasharray="4,4"/>
        <path d="M32 0 Q28 16 32 32 Q36 48 32 64" stroke="#1a3a55" stroke-width="1" fill="none" stroke-dasharray="4,4"/>
      </g>
      <circle cx="16" cy="16" r="1" fill="#2a5a8a" opacity="0.3"/>
      <circle cx="48" cy="48" r="1.5" fill="#2a5a8a" opacity="0.2"/>
    </pattern>
    <pattern id="waterShallow" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#153a5d"/>
      <g fill="#2a5a8a" opacity="0.5">
        <path d="M0 20 Q16 16 32 20 Q48 24 64 20" stroke="#3a7a9a" stroke-width="1" fill="none"/>
        <path d="M0 44 Q16 40 32 44 Q48 48 64 44" stroke="#3a7a9a" stroke-width="0.8" fill="none" stroke-dasharray="3,3"/>
      </g>
      <ellipse cx="20" cy="20" rx="3" ry="2" fill="#4a9acf" opacity="0.4"/>
      <ellipse cx="44" cy="44" rx="2" ry="1.5" fill="#4a9acf" opacity="0.3"/>
    </pattern>
    <pattern id="waterShore" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#1a3a55"/>
      <rect x="0" y="0" width="64" height="32" fill="#2a5a7d"/>
      <g fill="#3a7a9a" opacity="0.6">
        <path d="M0 32 Q16 28 32 32 Q48 36 64 32" stroke="#4a9acf" stroke-width="2" fill="none"/>
        <path d="M0 30 Q16 26 32 30 Q48 34 64 30" stroke="#4a9acf" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
        <path d="M0 34 Q16 38 32 34 Q48 30 64 34" stroke="#4a9acf" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
      </g>
      <!-- Foam -->
      <g fill="#FFFFFF" opacity="0.4">
        <ellipse cx="10" cy="32" rx="4" ry="2"/>
        <ellipse cx="32" cy="30" rx="6" ry="3"/>
        <ellipse cx="54" cy="33" rx="4" ry="2"/>
        <circle cx="20" cy="28" r="1.5"/>
        <circle cx="44" cy="34" r="1"/>
      </g>
    </pattern>
    <pattern id="river" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#0d2a3d"/>
      <g fill="#1a4a6d" opacity="0.5">
        <path d="M0 32 Q16 20 32 32 Q48 44 64 32" stroke="#2a6a8d" stroke-width="2" fill="none"/>
        <path d="M0 40 Q16 28 32 40 Q48 52 64 40" stroke="#2a6a8d" stroke-width="1" fill="none" stroke-dasharray="4,4"/>
        <path d="M0 24 Q16 36 32 24 Q48 12 64 24" stroke="#2a6a8d" stroke-width="1" fill="none" stroke-dasharray="4,4"/>
      </g>
      <g fill="#3a8abf" opacity="0.4">
        <ellipse cx="32" cy="32" rx="8" ry="4"/>
      </g>
    </pattern>
    <pattern id="canal" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#1a2d3d"/>
      <rect x="8" y="8" width="48" height="48" fill="#0d2a3d"/>
      <rect x="12" y="12" width="40" height="40" fill="#153a55"/>
      <g stroke="#2a5a7a" stroke-width="2">
        <line x1="8" y1="8" x2="8" y2="56"/>
        <line x1="56" y1="8" x2="56" y2="56"/>
        <line x1="8" y1="8" x2="56" y2="8"/>
        <line x1="8" y1="56" x2="56" y2="56"/>
      </g>
      <g fill="#3a7a9a" opacity="0.3">
        <rect x="16" y="16" width="32" height="32"/>
      </g>
    </pattern>
    <pattern id="portWater" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#0a1a2a"/>
      <g fill="#1a3a4a" opacity="0.4">
        <rect x="0" y="0" width="64" height="16"/>
        <rect x="0" y="48" width="64" height="16"/>
        <rect x="0" y="0" width="16" height="64"/>
        <rect x="48" y="0" width="16" height="64"/>
      </g>
      <g stroke="#2a5a6a" stroke-width="1.5" opacity="0.5">
        <line x1="16" y1="16" x2="48" y2="16"/>
        <line x1="16" y1="48" x2="48" y2="48"/>
        <line x1="16" y1="16" x2="16" y2="48"/>
        <line x1="48" y1="16" x2="48" y2="48"/>
      </g>
      <!-- Dock lines -->
      <g stroke="#4a4a4a" stroke-width="3" opacity="0.6">
        <line x1="8" y1="16" x2="8" y2="48"/>
        <line x1="56" y1="16" x2="56" y2="48"/>
      </g>
    </pattern>
  </defs>
  
