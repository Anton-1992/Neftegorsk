<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="asphalt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="50%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <pattern id="roadTexture" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="url(#asphalt)"/>
      <circle cx="4" cy="4" r="1" fill="#3a3a3a" opacity="0.3"/>
      <circle cx="12" cy="12" r="1" fill="#3a3a3a" opacity="0.3"/>
      <circle cx="8" cy="8" r="0.5" fill="#404040" opacity="0.2"/>
    </pattern>
  </defs>
  
  <rect width="128" height="128" fill="url(#roadTexture)"/>
  
  <!-- Lane markings -->
  <g stroke="#FFFFFF" stroke-width="2" opacity="0.6">
    <!-- Center dashed line -->
    <line x1="64" y1="0" x2="64" y2="20"/>
    <line x1="64" y1="35" x2="64" y2="55"/>
    <line x1="64" y1="70" x2="64" y2="90"/>
    <line x1="64" y1="105" x2="64" y2="128"/>
    
    <!-- Edge lines -->
    <line x1="16" y1="0" x2="16" y2="128"/>
    <line x1="112" y1="0" x2="112" y2="128"/>
  </g>
  
  <!-- Crosswalk -->
  <g fill="#FFFFFF" opacity="0.4">
    <rect x="16" y="48" width="96" height="4"/>
    <rect x="16" y="56" width="96" height="4"/>
    <rect x="16" y="64" width="96" height="4"/>
  </g>
</svg>