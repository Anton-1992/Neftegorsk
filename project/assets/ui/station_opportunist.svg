<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="oppCanopy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a5a5a"/>
      <stop offset="100%" style="stop-color:#3a3a3a"/>
    </linearGradient>
    <linearGradient id="oppPump" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff8800"/>
      <stop offset="100%" style="stop-color:#cc6600"/>
    </linearGradient>
    <pattern id="containerTex" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#4a4a4a"/>
      <rect x="0" y="0" width="16" height="2" fill="#6a6a6a"/>
      <rect x="0" y="8" width="16" height="2" fill="#6a6a6a"/>
      <rect x="8" y="0" width="2" height="16" fill="#6a6a6a"/>
    </pattern>
  </defs>
  
  <!-- Canopy -->
  <path d="M10 22 L118 22 L118 38 Q118 44 112 44 L16 44 Q10 44 10 38 Z" fill="url(#oppCanopy)" stroke="#777" stroke-width="1"/>
  <path d="M10 22 L118 22 L118 38 Q118 44 112 44 L16 44 Q10 44 10 38 Z" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>
  
  <!-- Pillars -->
  <rect x="18" y="38" width="10" height="42" fill="#666"/>
  <rect x="100" y="38" width="10" height="42" fill="#666"/>
  
  <!-- Pumps (mixed old/new) -->
  <g fill="url(#oppPump)">
    <rect x="22" y="84" width="18" height="30" rx="2"/>
    <rect x="46" y="84" width="18" height="30" rx="2"/>
    <rect x="88" y="84" width="18" height="30" rx="2"/>
  </g>
  <!-- Old pump -->
  <path d="M70 84 L70 114" stroke="#888" stroke-width="6" stroke-linecap="round"/>
  <circle cx="70" cy="80" r="8" fill="#999"/>
  
  <!-- Container office -->
  <rect x="22" y="48" width="52" height="32" fill="url(#containerTex)" stroke="#555" stroke-width="2"/>
  <rect x="34" y="54" width="28" height="10" fill="#2a2a2a"/>
  <text x="48" y="62" font-size="6" fill="#ff8800" text-anchor="middle" font-weight="bold">OFFICE</text>
  
  <!-- Expansion joints -->
  <line x1="40" y1="22" x2="40" y2="38" stroke="#888" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="88" y1="22" x2="88" y2="38" stroke="#888" stroke-width="2" stroke-dasharray="3,3"/>
  
  <!-- Construction materials -->
  <rect x="80" y="50" width="20" height="16" fill="#775533"/>
  <rect x="82" y="52" width="16" height="12" fill="#886644"/>
  
  <!-- Sign -->
  <rect x="60" y="8" width="60" height="16" rx="3" fill="#1a1a1a" stroke="#ff8800" stroke-width="1"/>
  <text x="90" y="20" font-size="9" fill="#ff8800" text-anchor="middle" font-weight="bold">NEW MGMT</text>
  
  <!-- Chameleon accent -->
  <circle cx="10" cy="10" r="6" fill="#00aa88" opacity="0.8"/>
</svg>